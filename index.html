
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xat Crt Xatframe</title>
    <!-- Fuente para textos técnicos del HUD -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-on: #00ff41;  /* Verde Neón/Fósforo puro */
            --color-dim: #004d13;
            --color-bg: #010a01;  /* Fondo casi negro para alto contraste */
            --color-glow: rgba(0, 255, 65, 0.6);
            --dot: 4px; /* Tamaño de los diodos LED por defecto */
        }

        /* En móviles, reducimos el tamaño de los LEDs para mejor resolución */
        @media (max-width: 600px) {
            :root { --dot: 3px; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--color-bg);
            color: var(--color-on);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; /* Fallback para navegadores antiguos */
            height: 100dvh; /* Altura dinámica perfecta para móviles (evita salto por barra de URL) */
            width: 100vw;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            -webkit-font-smoothing: antialiased; /* Suavizado de fuentes en WebKit/Safari/Móviles */
            -moz-osx-font-smoothing: grayscale; /* Suavizado en Firefox macOS */
        }

        /* --- MÁSCARA LED Y TEXTURAS CRT --- */
        
        /* Capa de Píxeles (Optimizada para todos los navegadores) */
        .crt-overlay {
            position: fixed; inset: 0; z-index: 100; pointer-events: none;
            /* Suavizamos el efecto: más área transparente y menor opacidad general para mayor legibilidad */
            background-image: -webkit-radial-gradient(center, transparent 40%, var(--color-bg) 65%);
            background-image: radial-gradient(circle at center, transparent 40%, var(--color-bg) 65%);
            background-size: var(--dot) var(--dot);
            background-position: 0 0;
            opacity: 0.75; 
            -webkit-transform: translateZ(0); transform: translateZ(0); /* Aceleración GPU: previene parpadeos y distorsión de píxeles en móviles/Retina */
        }
        
        /* Líneas de escaneo horizontales */
        .scanlines {
            position: fixed; inset: 0; z-index: 101; pointer-events: none;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 20, 0, 0.6) 51%);
            background-size: 100% 6px;
            animation: scanline-scroll 8s linear infinite;
        }

        /* Ruido visual (Estática de TV) puramente CSS */
        .noise {
            position: fixed; inset: 0; z-index: 99; pointer-events: none;
            opacity: 0.04;
            background-image: repeating-radial-gradient(circle at 17% 32%, white, black 0.00085px);
            animation: tv-static 0.2s infinite;
        }
        
        /* Viñeta curva de monitor oscuro */
        .vignette {
            position: fixed; inset: 0; z-index: 102; pointer-events: none;
            background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.95) 100%);
        }

        /* --- LAYOUT TIPO DASHBOARD (MOCKUP) --- */
        .dashboard {
            width: 90vw; max-width: 1400px; height: 85vh;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; z-index: 10;
            animation: crt-flicker 0.15s infinite;
        }

        /* Barras Superior e Inferior */
        .hud-row {
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            font-size: 1.8rem; font-weight: bold;
            text-shadow: 0 0 10px var(--color-glow);
            padding: 0 10px;
            letter-spacing: 2px;
        }

        /* Alineación interna de las secciones del HUD */
        .hud-left { display: flex; justify-content: flex-start; align-items: center; gap: 15px; }
        .hud-center { display: flex; justify-content: center; align-items: center; }
        .hud-right { display: flex; justify-content: flex-end; align-items: center; }

        .hud-line {
            height: 8px; width: 100%;
            background: var(--color-on);
            margin: 15px 0;
            box-shadow: 0 0 15px var(--color-glow);
        }

        /* Iconos y Decoraciones HUD Animadas */
        .hud-icons { display: flex; gap: 15px; align-items: center; }
        
        .clock-display { font-size: 1.8rem; letter-spacing: 4px; }

        .spinner {
            width: 26px; height: 26px;
            border: 4px solid rgba(0, 0, 0, 0);
            border-top: 4px solid var(--color-on);
            border-right: 4px solid var(--color-on);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--color-glow);
        }

        .icon-chain { display: flex; gap: 4px; }
        .icon-chain span { 
            width: 16px; height: 22px; 
            border: 4px solid var(--color-on); border-radius: 6px; 
            animation: pulse-op 2s infinite alternate;
        }
        .icon-chain span:nth-child(2) { animation-delay: 0.5s; }
        .icon-chain span:nth-child(3) { animation-delay: 1s; }
        .icon-chain span:nth-child(4) { animation-delay: 1.5s; }

        /* Barra de Carga (Loading) Inferior */
        .loading-container {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }
        .loading-bar {
            width: 150px; height: 16px;
            border: 2px solid var(--color-on);
            padding: 2px;
            box-shadow: 0 0 10px var(--color-glow);
        }
        .loading-fill {
            height: 100%; width: 0%;
            background: var(--color-on);
            box-shadow: 0 0 5px var(--color-glow);
            animation: fill-bar 4s steps(10) infinite;
        }

        /* Efecto Typewriter */
        .typing-container { display: flex; align-items: center; }
        .typewriter {
            overflow: hidden; white-space: nowrap; border-right: 0;
            animation: typing 4s steps(25, end) infinite alternate;
        }
        .cursor { animation: blink-cursor 1s step-end infinite; }

        /* --- CENTRO: PLANETA --- */
        .main-display {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* Saturno Mejorado (Sin sombras cortadas) */
        .saturn {
            position: absolute;
            top: 50%; left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(-15deg);
            transform: translate(-50%, -50%) rotate(-15deg);
            opacity: 0.95;
            -webkit-animation: float 8s ease-in-out infinite;
            animation: float 8s ease-in-out infinite;
            z-index: 5;
            /* Compatibilidad Cross-Browser para filtros y drop-shadow */
            -webkit-filter: drop-shadow(0 0 15px var(--color-glow)) drop-shadow(0 0 40px var(--color-glow));
            filter: drop-shadow(0 0 15px var(--color-glow)) drop-shadow(0 0 40px var(--color-glow));
        }
        
        .planet-body {
            width: 350px; height: 350px;
            background: var(--color-on); border-radius: 50%;
            /* Sombra interna para crear la fase lunar perfecta (sin divs extras) */
            box-shadow: inset -50px -30px 0px rgba(1, 10, 1, 0.85);
            position: relative; z-index: 2;
        }

        .saturn-ring {
            position: absolute; top: 50%; left: 50%;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            width: 550px; height: 100px; /* Un poco más delgado para mejor perspectiva */
            border: 20px solid var(--color-on); 
            border-radius: 50%;
            box-sizing: border-box;
            /* Se eliminó el box-shadow de aquí, ahora lo maneja el padre con drop-shadow */
        }
        .ring-back { z-index: 1; -webkit-clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); }
        .ring-front { z-index: 4; -webkit-clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%); clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%); }

        /* --- CONTENEDOR INFERIOR ESTRUCTURADO (Textos Mini) --- */
        .bottom-section {
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 5;
        }

        .mini-hud-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 10px;
            margin-bottom: -5px; /* Acercarlo sutilmente a la barra principal */
        }

        .mini-arrows {
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 2.2rem;
            display: flex;
            gap: 5px;
            text-shadow: 0 0 10px var(--color-glow), 0 0 20px var(--color-on);
            letter-spacing: -2px;
        }

        .mini-xat {
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 2.8rem;
            letter-spacing: 2px;
            -webkit-transform: scaleX(1.2);
            transform: scaleX(1.2);
            -webkit-transform-origin: right bottom;
            transform-origin: right bottom;
            text-shadow: 0 0 10px var(--color-glow), 0 0 20px var(--color-on);
        }

        .arrow { animation: blink 1.2s infinite step-end; }
        .arrow:nth-child(2) { animation-delay: 0.2s; }
        .arrow:nth-child(3) { animation-delay: 0.4s; }

        /* --- BOTÓN DE COLOR CRT --- */
        .crt-btn {
            position: absolute; top: 65px; right: 5%; z-index: 90; /* Z-index por debajo de 100 para que la textura CRT le afecte */
            background: transparent; color: var(--color-on);
            border: none; padding: 0;
            font-family: 'Share Tech Mono', 'Courier New', monospace; font-size: 1.5rem;
            font-weight: bold; cursor: pointer;
            text-shadow: 0 0 10px var(--color-glow);
            transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 2px;
            -webkit-animation: crt-flicker 0.15s infinite; /* Efecto de parpadeo CRT de pantalla */
            animation: crt-flicker 0.15s infinite;
        }
        .crt-btn::before { content: '['; margin-right: 8px; opacity: 0.7; }
        .crt-btn::after { content: ']'; margin-left: 8px; opacity: 0.7; }

        .crt-btn:hover {
            color: var(--color-bg); background: var(--color-on);
            box-shadow: 0 0 15px var(--color-glow);
        }
        .crt-btn:active { -webkit-transform: scale(0.95); transform: scale(0.95); }

        /* --- ANIMACIONES KEYFRAMES --- */
        @keyframes tv-static { 0% { background-position: 0px 0px; } 100% { background-position: 100px 100px; } }
        @keyframes scanline-scroll { 0% { background-position: 0 0; } 100% { background-position: 0 100vh; } }
        @keyframes float { 0%, 100% { transform: translate(-50%, -50%) rotate(-15deg); } 50% { transform: translate(-50%, -55%) rotate(-15deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes typing { 0%, 20% { width: 0; } 80%, 100% { width: 100%; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-op { 0% { opacity: 0.2; } 100% { opacity: 1; } }
        @keyframes fill-bar { 0% { width: 0%; } 20% { width: 20%; } 40% { width: 40%; } 60% { width: 60%; } 80% { width: 80%; } 100% { width: 100%; } }
        @keyframes crt-flicker {
            0%, 100% { opacity: 1; }
            33% { opacity: 0.94; }
            66% { opacity: 0.98; text-shadow: 0 0 15px var(--color-glow); }
        }

        /* --- RESPONSIVIDAD (ESCALADO UNIFORME) --- */
        @media (max-width: 1024px) {
            .planet-body { width: 250px; height: 250px; box-shadow: inset -35px -20px 0px rgba(1, 10, 1, 0.85); }
            .saturn-ring { width: 400px; height: 75px; border-width: 15px; }
            .hud-row { font-size: 1.2rem; }
            .mini-xat { font-size: 2.2rem; }
            .mini-arrows { font-size: 1.8rem; }
        }
        @media (max-width: 600px) {
            .loading-container, .icon-chain, .typing-container { display: none; }
            .planet-body { width: 160px; height: 160px; box-shadow: inset -25px -15px 0px rgba(1, 10, 1, 0.85); }
            .saturn-ring { width: 260px; height: 50px; border-width: 10px; }
            .hud-row { font-size: 1rem; }
            .crt-btn { font-size: 1.2rem; top: 85px; }
            .mini-xat { font-size: 1.6rem; -webkit-transform: scaleX(1); transform: scaleX(1); }
            .mini-arrows { font-size: 1.4rem; }
        }
    </style>
</head>
<!-- Prevenir el click derecho directamente en el body también -->
<body oncontextmenu="return false;">

    <!-- Capas de superposición y textura CRT pura -->
    <div class="noise"></div>
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- Botón interactivo a 65px de altura -->
    <button id="colorBtn" class="crt-btn">COLOR</button>

    <!-- Contenedor HUD Mockup -->
    <div class="dashboard">
        
        <!-- HUD Superior -->
        <div>
            <div class="hud-row">
                <!-- Izquierda: Texto animado -->
                <div class="hud-left">
                    <div class="typing-container">
                        <span class="typewriter">ESTABLISHING CONNECTION</span><span class="cursor">_</span>
                    </div>
                </div>
                
                <!-- Centro: Spinner centrado (justo arriba del planeta) -->
                <div class="hud-center">
                    <div class="spinner"></div>
                </div>

                <!-- Derecha: Vacía -->
                <div class="hud-right"></div>
            </div>
            <div class="hud-line"></div>
        </div>

        <!-- Pantalla Central -->
        <div class="main-display">
            <!-- Planeta Saturno Absolutamente Impecable -->
            <div class="saturn">
                <div class="saturn-ring ring-back"></div>
                <div class="planet-body"></div>
                <div class="saturn-ring ring-front"></div>
            </div>
        </div>

        <!-- Bloque Inferior Integrado (Textos Mini y HUD Inferior) -->
        <div class="bottom-section">
            
            <!-- Textos y flechas anclados aquí para que nunca se desajusten -->
            <div class="mini-hud-row">
                <div class="mini-arrows">
                    <span class="arrow">&lt;</span>
                    <span class="arrow">&lt;</span>
                    <span class="arrow">&lt;</span>
                </div>
                <div class="mini-xat">XAT.COM</div>
            </div>

            <div class="hud-line"></div>
            
            <div class="hud-row">
                <!-- Izquierda: Número 42 -->
                <div class="hud-left">
                    <span id="processingNumber">42</span>
                </div>
                
                <!-- Centro: Barra de carga -->
                <div class="hud-center">
                    <div class="loading-container">
                        <span>LOADING</span>
                        <div class="loading-bar"><div class="loading-fill"></div></div>
                    </div>
                </div>
                
                <!-- Derecha: Reloj en tiempo real (reemplaza letras japonesas) -->
                <div class="hud-right">
                    <span id="realTimeClock" class="clock-display">00:00:00</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Lógica de Interactividad y Protecciones -->
    <script>
        // --- PROTECCIÓN DE CÓDIGO FUENTE Y CONSOLA ---
        
        // Bloquear click derecho
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Bloquear atajos de teclado (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, etc)
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
            }
            // Ctrl+Shift+I / Cmd+Option+I (Inspeccionar)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {
                e.preventDefault();
            }
            // Ctrl+Shift+J / Cmd+Option+J (Consola)
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) {
                e.preventDefault();
            }
            // Ctrl+Shift+C / Cmd+Option+C (Inspeccionar Elemento)
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c' || e.keyCode === 67)) {
                e.preventDefault();
            }
            // Ctrl+U / Cmd+U (Ver código fuente)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
                e.preventDefault();
            }
        });


        // --- LÓGICA DE LA INTERFAZ ---

        // 1. Reloj en tiempo real
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('realTimeClock').innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); 

        // 2. Cambio de paletas de color
        const colors = [
            { on: '#00ff41', glow: 'rgba(0, 255, 65, 0.6)' },   
            { on: '#ffb000', glow: 'rgba(255, 176, 0, 0.6)' },  
            { on: '#00ffff', glow: 'rgba(0, 255, 255, 0.6)' },  
            { on: '#ff00ff', glow: 'rgba(255, 0, 255, 0.6)' },  
            { on: '#ff003c', glow: 'rgba(255, 0, 60, 0.6)' },   
            { on: '#ffffff', glow: 'rgba(255, 255, 255, 0.6)' } 
        ];
        
        let colorIndex = 0;
        const colorBtn = document.getElementById('colorBtn');
        
        colorBtn.addEventListener('click', () => {
            colorIndex = (colorIndex + 1) % colors.length;
            document.documentElement.style.setProperty('--color-on', colors[colorIndex].on);
            document.documentElement.style.setProperty('--color-glow', colors[colorIndex].glow);
        });

        // 3. Animación de "procesamiento" para el número 42
        const procNum = document.getElementById('processingNumber');
        let isCalculating = false;
        
        setInterval(() => {
            if (Math.random() > 0.8) isCalculating = !isCalculating;
            
            if (isCalculating) {
                procNum.innerText = Math.floor(Math.random() * 99).toString().padStart(2, '0');
            } else {
                procNum.innerText = '42';
            }
        }, 50);
    </script>
</body>
</html>
